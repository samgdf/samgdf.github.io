<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <link rel="icon" type="image/png" href="/favicon-pixel.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400&display=swap" rel="stylesheet">
  <title>Sam Goldfield</title>
  <style>
    :root {
      --bg: #8b6a43;
      --text: #f7f4ea;
      --link: #ffffff;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #2a1448;
        --text: #f3ecff;
        --link: #ffffff;
      }
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "IBM Plex Sans", "Segoe UI", Arial, sans-serif;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 1rem;
    }

    .content {
      width: min(64vmin, 27rem);
      aspect-ratio: 1 / 1;
      border-radius: 1.2rem;
      display: grid;
      place-items: center;
      padding: 1.6rem;
    }

    p {
      margin: 0;
      font-size: clamp(1rem, 1.9vw, 1.35rem);
      line-height: 1.35;
      font-weight: 400;
      letter-spacing: 0.01em;
      text-wrap: pretty;
      cursor: default;
    }

    a {
      color: var(--link);
      text-underline-offset: 0.2em;
      filter: brightness(1);
      transition: filter 220ms ease;
    }

    a:hover {
      filter: brightness(1.2);
    }

    .word {
      display: inline-block;
      line-height: 1.1;
      transform: translateX(0) scale(1);
      transform-origin: center 75%;
      transition: transform 1000ms cubic-bezier(0.22, 0.61, 0.36, 1);
      will-change: transform;
    }

    .word.name-focus {
      filter: brightness(1);
      transition: transform 1000ms cubic-bezier(0.22, 0.61, 0.36, 1), filter 220ms ease;
    }

    .word.name-focus:hover {
      filter: brightness(1.2);
    }
  </style>
</head>
<body>
  <main class="content">
    <p id="bubble-text">
      Hello, my name is Sam Goldfield. Here is my
      <a href="https://www.linkedin.com/in/samgdf" target="_blank" rel="noopener noreferrer">Linkedin</a>
      and here is my
      <a href="https://github.com/samgdf" target="_blank" rel="noopener noreferrer">Github</a>.
    </p>
  </main>
  <script>
    const bubbleText = document.getElementById('bubble-text');
    const NAME_WORDS = new Set(['sam', 'goldfield']);
    const radius = 90;
    const maxScale = 1.55;
    const minGap = 1;
    let metrics = [];
    let lineGroups = [];

    function wrapWords(node) {
      const walker = document.createTreeWalker(node, NodeFilter.SHOW_TEXT);
      const textNodes = [];
      let current;

      while ((current = walker.nextNode())) {
        if (current.textContent.trim()) {
          textNodes.push(current);
        }
      }

      textNodes.forEach((textNode) => {
        const fragment = document.createDocumentFragment();
        const parts = textNode.textContent.split(/(\s+)/);

        parts.forEach((part) => {
          if (!part) return;
          if (/^\s+$/.test(part)) {
            fragment.appendChild(document.createTextNode(part));
            return;
          }
          const span = document.createElement('span');
          span.className = 'word';
          span.textContent = part;
          fragment.appendChild(span);
        });

        textNode.parentNode.replaceChild(fragment, textNode);
      });
    }

    wrapWords(bubbleText);
    const words = Array.from(document.querySelectorAll('.word'));
    words.forEach((word) => {
      const normalized = word.textContent.replace(/[^\w]/g, '').toLowerCase();
      if (NAME_WORDS.has(normalized)) {
        word.classList.add('name-focus');
      }
    });

    function resetWords() {
      words.forEach((word) => {
        word.style.transform = 'translateX(0px) scale(1)';
      });
    }

    function cacheMetrics() {
      resetWords();
      metrics = words.map((word) => {
        const rect = word.getBoundingClientRect();
        return {
          centerX: rect.left + rect.width / 2,
          centerY: rect.top + rect.height / 2,
          width: rect.width,
          lineKey: Math.round(rect.top)
        };
      });
      lineGroups = Array.from(
        metrics.reduce((groups, meta, index) => {
          if (!groups.has(meta.lineKey)) groups.set(meta.lineKey, []);
          groups.get(meta.lineKey).push(index);
          return groups;
        }, new Map()).values()
      );
    }

    cacheMetrics();
    window.addEventListener('load', cacheMetrics);
    document.fonts?.ready.then(cacheMetrics);

    bubbleText.addEventListener('mousemove', (event) => {
      const mouseX = event.clientX;
      const mouseY = event.clientY;

      const scales = metrics.map((meta) => {
        const dx = mouseX - meta.centerX;
        const dy = mouseY - meta.centerY;
        const distance = Math.hypot(dx, dy);
        const influence = Math.max(0, 1 - distance / radius);
        return {
          influence,
          scale: 1 + influence * (maxScale - 1)
        };
      });

      const translations = new Array(words.length).fill(0);

      lineGroups.forEach((indices) => {
        let focus = indices[0];
        let bestInfluence = -1;
        indices.forEach((idx) => {
          if (scales[idx].influence > bestInfluence) {
            bestInfluence = scales[idx].influence;
            focus = idx;
          }
        });

        const focusPos = indices.indexOf(focus);
        translations[focus] = 0;

        for (let p = focusPos + 1; p < indices.length; p += 1) {
          const prev = indices[p - 1];
          const curr = indices[p];
          const prevHalf = (metrics[prev].width * scales[prev].scale) / 2;
          const currHalf = (metrics[curr].width * scales[curr].scale) / 2;
          const prevRight = metrics[prev].centerX + translations[prev] + prevHalf;
          const currLeft = metrics[curr].centerX - currHalf;
          const neededShift = prevRight + minGap - currLeft;
          translations[curr] = Math.max(0, neededShift);
        }

        for (let p = focusPos - 1; p >= 0; p -= 1) {
          const next = indices[p + 1];
          const curr = indices[p];
          const nextHalf = (metrics[next].width * scales[next].scale) / 2;
          const currHalf = (metrics[curr].width * scales[curr].scale) / 2;
          const nextLeft = metrics[next].centerX + translations[next] - nextHalf;
          const currRight = metrics[curr].centerX + currHalf;
          const neededShift = nextLeft - minGap - currRight;
          translations[curr] = Math.min(0, neededShift);
        }
      });

      words.forEach((word, index) => {
        word.style.transform = `translateX(${translations[index]}px) scale(${scales[index].scale})`;
      });
    });

    bubbleText.addEventListener('mouseleave', resetWords);
    window.addEventListener('resize', cacheMetrics);
  </script>
</body>
</html>
